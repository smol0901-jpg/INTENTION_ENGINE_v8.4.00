  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    /**
     * ============================================================
     * 3D СЦЕНА: КУБ 100×100×100 С ВРАЩАЮЩЕЙСЯ КАМЕРОЙ ВНУТРИ
     * ============================================================
     * Создаём эффект нахождения внутри куба с ядром и частицами.
     * Камера автоматически вращается вокруг центра.
     * ============================================================
     */

    (function init3D() {
      const container = document.getElementById('three-container');
      const width = window.innerWidth;
      const height = window.innerHeight;

      // ----- СЦЕНА -----
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a0f); // совпадает с фоном body

      // ----- КАМЕРА (внутри куба) -----
      const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
      camera.position.set(0, 0, 30); // стоит внутри, смотрит в центр

      // ----- РЕНДЕРЕР -----
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setSize(width, height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = false; // не нужны тени для производительности
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      container.appendChild(renderer.domElement);

      // ----- ОСВЕЩЕНИЕ -----
      const ambientLight = new THREE.AmbientLight(0x404060);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(1, 1, 1);
      scene.add(dirLight);

      const backLight = new THREE.PointLight(0x40e0d0, 0.5);
      backLight.position.set(-5, 0, -5);
      scene.add(backLight);

      // ----- 1. КАРКАС КУБА (полупрозрачные рёбра) -----
      const cubeSize = 50; // размер куба 50 единиц (камера внутри)
      const boxGeometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
      const edges = new THREE.EdgesGeometry(boxGeometry);
      const lineMat = new THREE.LineBasicMaterial({
        color: 0x40e0d0,
        transparent: true,
        opacity: 0.2,
      });
      const wireframe = new THREE.LineSegments(edges, lineMat);
      scene.add(wireframe);

      // ----- 2. СВЕТЯЩЕЕСЯ ЯДРО (в центре) -----
      const coreGeo = new THREE.SphereGeometry(4, 32, 32);
      const coreMat = new THREE.MeshStandardMaterial({
        color: 0x40e0d0,
        emissive: 0x40e0d0,
        emissiveIntensity: 0.8,
        roughness: 0.2,
        metalness: 0.8,
      });
      const core = new THREE.Mesh(coreGeo, coreMat);
      core.position.set(0, 0, 0);
      scene.add(core);

      // Внутреннее свечение (дополнительная сфера)
      const glowGeo = new THREE.SphereGeometry(5, 24, 24);
      const glowMat = new THREE.MeshBasicMaterial({
        color: 0x40e0d0,
        transparent: true,
        opacity: 0.15,
        blending: THREE.AdditiveBlending,
      });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      glow.position.set(0, 0, 0);
      scene.add(glow);

      // ----- 3. ЧАСТИЦЫ (роящиеся вокруг ядра) -----
      const particleCount = 2000;
      const particlesGeo = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const colors = new Float32Array(particleCount * 3);

      const color1 = new THREE.Color(0x40e0d0);
      const color2 = new THREE.Color(0xa0e0ff);

      for (let i = 0; i < particleCount; i++) {
        // Случайное положение в сфере радиуса 20-40
        const radius = 12 + Math.random() * 25;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);

        const x = radius * Math.sin(phi) * Math.cos(theta);
        const y = radius * Math.sin(phi) * Math.sin(theta);
        const z = radius * Math.cos(phi);

        positions[i * 3] = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z;

        // Цвет: смесь двух оттенков
        const mix = Math.random();
        const c = color1.clone().lerp(color2, mix);
        colors[i * 3] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;
      }

      particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      particlesGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const particleMat = new THREE.PointsMaterial({
        size: 0.3,
        vertexColors: true,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      const particleSystem = new THREE.Points(particlesGeo, particleMat);
      scene.add(particleSystem);

      // ----- 4. ДОПОЛНИТЕЛЬНЫЕ СВЕТЯЩИЕСЯ ТОЧКИ (мелкие) -----
      const sparkleGeo = new THREE.BufferGeometry();
      const sparklePos = new Float32Array(600 * 3);
      for (let i = 0; i < 600; i++) {
        const r = 15 + Math.random() * 30;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        sparklePos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        sparklePos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        sparklePos[i * 3 + 2] = r * Math.cos(phi);
      }
      sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePos, 3));
      const sparkleMat = new THREE.PointsMaterial({
        size: 0.6,
        color: 0x88ddff,
        transparent: true,
        opacity: 0.4,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      const sparkles = new THREE.Points(sparkleGeo, sparkleMat);
      scene.add(sparkles);

      // ----- 5. ТУМАН (для глубины) -----
      scene.fog = new THREE.FogExp2(0x0a0a0f, 0.008);

      // ----- АНИМАЦИЯ ВРАЩЕНИЯ КАМЕРЫ -----
      let angle = 0;
      const radius = 28; // расстояние от центра
      const speed = 0.005; // скорость вращения

      function animate() {
        requestAnimationFrame(animate);

        angle += speed;
        // Плавное вращение камеры вокруг центра
        camera.position.x = radius * Math.sin(angle);
        camera.position.z = radius * Math.cos(angle);
        camera.position.y = 8 * Math.sin(angle * 0.7); // небольшое колебание по вертикали
        camera.lookAt(0, 0, 0);

        // Вращение ядра
        core.rotation.x += 0.002;
        core.rotation.y += 0.005;
        glow.rotation.x += 0.001;
        glow.rotation.y += 0.002;

        // Вращение частиц (медленное)
        particleSystem.rotation.y += 0.0005;
        sparkles.rotation.y += 0.0003;

        renderer.render(scene, camera);
      }

      animate();

      // ----- ПЕРЕСЧЁТ ПРИ ИЗМЕНЕНИИ РАЗМЕРА ОКНА -----
      window.addEventListener('resize', () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      });
    })();
